default: &default
  adapter: postgresql
  encoding: unicode
  url: <%= ENV["DATABASE_URL"] %>
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default

test:
  <<: *default
  url: postgresql://vibers:vibers2026secure@49.50.138.93:5433/monopage_test

production:
  primary: &primary_production
    <<: *default
  cache:
    <<: *primary_production
    database: monopage_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: monopage_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: monopage_production_cable
    migrations_paths: db/cable_migrate
